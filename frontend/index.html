<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ride Sharing - Home</title>
    <!-- Google Font for a modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/home.css" />
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo">RideShare</h1>
            <nav id="mainNav">
                <a href="index.html">Home</a>
                <a href="signup.html">Sign Up</a>
                <a href="login.html">Log In</a>
                <a href="register.html">Register</a>
            </nav>
        </div>
    </header>
    <main class="container">
        <section class="hero">
            <h2>Welcome to RideShare</h2>
            <p>Get a ride when you need it. Register as a driver or sign up as a rider!</p>
            <div class="buttons">
                <a class="btn" href="signup.html">Sign Up</a>
                <a class="btn" href="login.html">Log In</a>
            </div>
        </section>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2026 RideShare</p>
        </div>
    </footer>
    <script src="js/common.js"></script>
    <script>
        // adjust hero when a user is already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser && getCurrentUser();
            if (user) {
                const h2 = document.querySelector('.hero h2');
                const p = document.querySelector('.hero p');
                const btns = document.querySelector('.hero .buttons');
                if (h2) h2.textContent = 'Welcome back, ' + user.firstName + '!';
                if (p) p.textContent = 'Ready for another ride? Check your profile or log out.';
                if (btns) {
                    btns.innerHTML = `
                        <a class="btn" href="profile.html">Profile</a>
                        <a class="btn" href="#" id="logoutBtn">Logout</a>
                    `;
                    document.getElementById('logoutBtn').addEventListener('click', (e) => {
                        e.preventDefault();
                        logout();
                    });
                }
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ride Sharing - Home</title>
    <!-- Google Font for a modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/home.css" />
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo">RideShare</h1>
            <nav id="mainNav">
                <a href="index.html">Home</a>
                <a href="signup.html">Sign Up</a>
                <a href="login.html">Log In</a>
                <a href="register.html">Register</a>
            </nav>
        </div>
    </header>
    <main class="container">
        <section class="hero">
            <h2>Welcome to RideShare</h2>
            <p>Get a ride when you need it. Register as a driver or sign up as a rider!</p>
            <div class="buttons">
                <a class="btn" href="signup.html">Sign Up</a>
                <a class="btn" href="login.html">Log In</a>
            </div>
        </section>
        <section class="ride-app">
            <div class="ride-left">
                <div class="search-bar">
                    <input id="searchRoute" type="search" placeholder="Search from or to" />
                </div>
                <h3>Available Rides</h3>
                <div id="ridesList" class="rides-list"></div>
            </div>
            <aside class="ride-right">
                <div class="card create-ride">
                    <h3>Create a Ride</h3>
                    <form id="createRideForm" class="form" novalidate>
                        <div class="form-group">
                            <label for="rideFrom">From</label>
                            <input type="text" id="rideFrom" name="rideFrom" required />
                        </div>
                        <div class="form-group">
                            <label for="rideTo">To</label>
                            <input type="text" id="rideTo" name="rideTo" required />
                        </div>
                        <div class="form-group">
                            <label for="rideDate">Date</label>
                            <input type="date" id="rideDate" name="rideDate" required />
                        </div>
                        <div class="form-group">
                            <label for="rideTime">Time</label>
                            <input type="time" id="rideTime" name="rideTime" required />
                        </div>
                        <div class="form-group">
                            <label for="rideSeats">Seats</label>
                            <input type="number" id="rideSeats" name="rideSeats" min="1" value="1" required />
                        </div>
                        <div class="form-group">
                            <label for="ridePrice">Price (₹)</label>
                            <input type="number" id="ridePrice" name="ridePrice" min="0" step="0.01" />
                        </div>
                        <div class="form-group">
                            <label for="rideNotes">Notes</label>
                            <textarea id="rideNotes" name="rideNotes"></textarea>
                        </div>
                        <button type="submit" class="btn">Create Ride</button>
                    </form>
                </div>
                <div class="card my-rides">
                    <h3>My Rides / Bookings</h3>
                    <div id="myRides"></div>
                </div>
            </aside>
        </section>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2026 RideShare</p>
        </div>
    </footer>
    <script src="js/common.js"></script>
    <script>
        // adjust hero when a user is already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser && getCurrentUser();
            if (user) {
                const h2 = document.querySelector('.hero h2');
                const p = document.querySelector('.hero p');
                const btns = document.querySelector('.hero .buttons');
                if (h2) h2.textContent = 'Welcome back, ' + user.firstName + '!';
                if (p) p.textContent = 'Ready for another ride? Check your profile or log out.';
                if (btns) {
                    btns.innerHTML = `
                        <a class="btn" href="profile.html">Profile</a>
                        <a class="btn" href="#" id="logoutBtn">Logout</a>
                    `;
                    document.getElementById('logoutBtn').addEventListener('click', (e) => {
                        e.preventDefault();
                        logout();
                    });
                }
            }
        });
    </script>
</body>
</html>

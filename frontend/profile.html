<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ride Sharing - Profile</title>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css" />
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo">RideShare</h1>
            <nav id="mainNav">
                <!-- populated by common.js -->
            </nav>
        </div>
    </header>
    <main class="container form-page">
        <div class="form">
            <h2>My Profile</h2>
            <p>Welcome, <span id="userName"></span>!</p>
            <p>You are logged in as <strong><span id="userEmail"></span></strong>.</p>
            <div id="driverInfo" style="margin-top:1rem;"></div>
            <button class="btn" id="logoutBtn">Logout</button>
        </div>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2026 RideShare</p>
        </div>
    </footer>
    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (!user) {
                location.href = 'login.html';
                return;
            }
            document.getElementById('userName').textContent = user.firstName + (user.lastName ? ' ' + user.lastName : '');
            document.getElementById('userEmail').textContent = user.email;
            // display driver profile if registered as driver
            const drivers = getDrivers();
            const mine = drivers.find(d => d.email === user.email);
            if (mine) {
                const info = document.getElementById('driverInfo');
                info.innerHTML = `<strong>Driver profile:</strong><br>
                    Name: ${mine.name}<br>
                    Phone: ${mine.phone}<br>
                    License: ${mine.license}<br>
                    Vehicle: ${mine.vehicle}`;
            }
            document.getElementById('logoutBtn').addEventListener('click', () => {
                logout();
            });
        });
    </script>
</body>
</html>
